# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: agent-framework-tools
description: >
  Seattle Hotel Agent - a travel assistant that helps users find hotels in
  Seattle. Demonstrates local Python tool execution with the Microsoft Agent
  Framework hosted via the Azure AI AgentServer SDK.
metadata:
  authors:
    - Microsoft
  tags:
    - Azure AI AgentServer
    - Microsoft Agent Framework
    - Local Tools
    - Travel Assistant
    - Hotel Search
protocols:
  - protocol: responses
    version: v1
environment_variables:
  - name: PROJECT_ENDPOINT
    value: ${PROJECT_ENDPOINT}
  - name: MODEL_DEPLOYMENT_NAME
    value: ${MODEL_DEPLOYMENT_NAME}
resources:
  cpu: '0.25'
  memory: 0.5Gi
dockerfile_path: Dockerfile
