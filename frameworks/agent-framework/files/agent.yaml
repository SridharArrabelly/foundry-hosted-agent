# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: agent-framework-files
description: >
  File Inspection Agent - a diagnostic hosted agent that reports what file /
  attachment content it can actually see in incoming user messages. Used to
  reproduce and debug hosted-agent file upload issues.
metadata:
  authors:
    - Microsoft
  tags:
    - Azure AI AgentServer
    - Microsoft Agent Framework
    - Files
    - Diagnostic
protocols:
  - protocol: responses
    version: 2.0.0
environment_variables:
  - name: FOUNDRY_PROJECT_ENDPOINT
    value: ${FOUNDRY_PROJECT_ENDPOINT}
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
resources:
  cpu: '0.25'
  memory: 0.5Gi
dockerfile_path: Dockerfile
